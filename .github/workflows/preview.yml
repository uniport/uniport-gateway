name: Preview Build

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - dependabot/**

# Prevent running builds for the same branch in parallel
# New workflows will cancel existing workflows…
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (preview)
    uses: ./.github/workflows/build.yml
    secrets:
      NEXUS3_PW: ${{ secrets.NEXUS3_PW }}
      NEXUS_NPM_TOKEN_READ_ONLY: ${{ secrets.NEXUS_NPM_TOKEN_READ_ONLY }}
      MACDUFF_KEYCHAIN_PASSWORD: ${{ secrets.MACDUFF_KEYCHAIN_PASSWORD }}

  tag:
    name: Nexus Tagging
    needs: [build]
    uses: uniport/workflows/.github/workflows/shared-nexus-tag-artifacts.yml@main
    with:
      version: ${{ needs.build.outputs.VERSION }}
      group_id: ${{ needs.build.outputs.GROUP_ID }}
      tag_docker: true
      tag_maven: true
      tag_npm: false
      tag_helm: false
    secrets:
      NEXUS3_PW: ${{ secrets.NEXUS3_PW }}

  # SBOM and attestation. The gate inside shared-sbom.yml lets only X.Y.x maintenance branches
  # through here (other feature-branch previews are skipped with a notice), matching the shared
  # build pipeline. The Dependency-Track upload runs on the self-hosted inventage-ephemeral-linux-amd64
  # runner group, which can reach the internal network (dtrack is not publicly reachable). The
  # upload job never runs in PR context (branch gate inside shared-sbom.yml), so fork code
  # cannot reach the runner.
  sbom:
    name: SBOM & Attestation
    needs: [build]
    uses: uniport/workflows/.github/workflows/shared-sbom.yml@main
    with:
      version: ${{ needs.build.outputs.VERSION }}
      dtrack_runner: inventage-ephemeral-linux-amd64
    secrets:
      NEXUS3_PW: ${{ secrets.NEXUS3_PW }}
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
      DEPENDENCY_TRACK_API_KEY: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}

  docs:
    name: Deploy Docs (preview)
    needs: [build]
    uses: ./.github/workflows/deploy-docs.yml
    # Do not deploy on forks
    if: ${{ !github.repository.fork }}
    permissions:
      actions: read
      statuses: write
      pull-requests: write
      deployments: write
    secrets:
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    with:
      alias: ${{ needs.build.outputs.branch_name_slug }}
      artifact_name: ${{ needs.build.outputs.docs_artifact_name }}
      artifact_path: ${{ needs.build.outputs.docs_artifact_path }}
      run_id: ${{ needs.build.outputs.run_id }}
      environment: docs
